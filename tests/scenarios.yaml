          url: https://graph.microsoft.com/v1.0/users/testuser%40yourtenant.onmicrosoft.com
        fixture: fixtures/200-user-exists.http
      - request:
          method: GET
          url: https://graph.microsoft.com/v1.0/roleManagement/directory/roleAssignments?%24filter=principalId+eq+%27c9139ac2-cd61-4dd7-b96d-6f0c3bcd36ca%27+and+roleDefinitionId+eq+%2788d8e3e3-8f55-4a1e-953a-9b9898b8876c%27+and+directoryScopeId+eq+%27%2F%27
        fixture: fixtures/400-invalid-role.http
    invoke:
      throws: "Failed to check existing role assignments for user testuser@yourtenant.onmicrosoft.com: 400 Bad Request"

  - name: subject not found - invalid principal ID during role assignment
    steps:
      - request:
          method: POST
          url: https://login.microsoftonline.com/test-tenant/oauth2/v2.0/token
          headers:
            Content-Type: application/x-www-form-urlencoded
        fixture: fixtures/200-oauth-token.http
      - request:
          method: GET
